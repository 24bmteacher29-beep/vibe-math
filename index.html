<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>중2 수학 퀴즈</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>중2 수학 수업 전 퀴즈</h1>
    <p class="subtitle">오늘의 수학 두뇌 깨우기!</p>

    <div class="quiz-box">
      <div id="question-number"></div>
      <h2 id="question">문제가 나옵니다.</h2>

      <div id="choices"></div>

      <p id="result"></p>

      <button id="next-btn">다음 문제</button>
    </div>

    <div class="score-box">
      점수: <span id="score">0</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
